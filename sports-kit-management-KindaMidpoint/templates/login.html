<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0e68c;
            background-image: url("static/images/p1.jpg");
            background-size: cover;

            background-blend-mode: darken;
            background-repeat: no-repeat;
            background-position: center;
            /* background-image: image('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f0e68c"/><circle cx="50" cy="50" r="40" fill="%23e6e6fa"/></svg>'); */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #1f4037;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #1f4037;
            outline: none;
            box-shadow: 0 0 5px rgba(31,64,55,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1f4037;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #14532d;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 13px;
            color: gray;
        }

        .flash-alert {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
        }
        .flash-danger { background: #dc3545; }
        .flash-warning { background: #f0ad4e; }
        .flash-success { background: #198754; }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Admin Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-alert flash-{% if category == 'danger' %}danger{% elif category == 'warning' %}warning{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer-text">
        
    </div>
</div>

</body>
</html>
